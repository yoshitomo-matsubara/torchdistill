name: Copilot CLI PR Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '26'
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot
      - name: Generate Review via Copilot CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticate the GitHub CLI using the workflow token
          echo "$GH_TOKEN" | gh auth login --with-token
          
          # Fetch the diff between the PR branch and the base branch
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          
          # Run Copilot CLI programmatically using a custom prompt
          copilot -p "Review the following git diff for security flaws, bugs, or logic errors: $(cat pr_diff.txt)" --no-ask-user > review_output.md

      - name: Comment Review on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: review_output.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}