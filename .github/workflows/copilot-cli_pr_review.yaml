name: Copilot CLI PR Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '26'
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GitHub Copilot
        run: npm install -g @github/copilot
      - name: Generate Review via Copilot
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_INSTRUCTIONS: .github/instructions/copilot-pr_review.md
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Get the diff using exact PR SHAs from the event payload
          git diff "$BASE_SHA" "$HEAD_SHA" > pr_diff.txt

          # Skip Copilot if the diff is empty (no changes to review)
          if [ ! -s pr_diff.txt ]; then
            echo "NO_CRITICAL_ISSUES" > review_output.md
            exit 0
          fi

          # Build prompt: strip YAML frontmatter from instructions, then append the diff
          awk '/^---/{found++; next} found>=2' "$REVIEW_INSTRUCTIONS" > prompt.txt
          printf '\nThe full PR diff is provided below. Do not run any commands or use any tools — base your review solely on this diff.\n\n' >> prompt.txt
          cat pr_diff.txt >> prompt.txt

          # Run Copilot CLI with the assembled prompt
          copilot -p "$(cat prompt.txt)" --no-ask-user > review_output.md
      - name: Check for critical issues
        id: check_issues
        run: |
          if grep -qF "NO_CRITICAL_ISSUES" review_output.md; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment Review on PR
        if: steps.check_issues.outputs.found == 'true'
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: review_output.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}